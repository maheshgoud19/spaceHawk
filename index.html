      ctx.textAlign = 'center';
      ctx.fillStyle = '#FF0044';
      ctx.shadowColor = '#FF0044';
      ctx.shadowBlur = 24;
      ctx.fillText('⚠ BOSS INCOMING ⚠', CANVAS_W / 2, CANVAS_H / 2);
      ctx.restore();
    }

    // Countdown
    if (this.state === 'countdown') {
      this._drawCountdown(ctx);
    }

    // Paused
    if (this.state === 'paused') {
      this._drawPauseMenu(ctx);
    }

    // Game Over
    if (this.state === 'gameover') {
      this._drawGameOver(ctx);
    }
  }

  _drawStartScreen(ctx) {
    // Title glow
    ctx.save();
    const t = Date.now() / 1000;
    ctx.textAlign = 'center';

    // Animated title
    const titleY = CANVAS_H * 0.22;
    ctx.font = 'bold 38px "Courier New"';
    ctx.shadowBlur = 30 + Math.sin(t * 2) * 10;
    ctx.shadowColor = '#00FFFF';
    ctx.fillStyle = '#00FFFF';
    ctx.fillText('STELLAR', CANVAS_W / 2, titleY);
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowColor = '#AADDFF';
    ctx.fillText('ASSAULT', CANVAS_W / 2, titleY + 44);

    // Decorative line
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#00AAFF';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(CANVAS_W * 0.15, titleY + 60);
    ctx.lineTo(CANVAS_W * 0.85, titleY + 60);
    ctx.stroke();

    // Animated demo ship
    const shipX = CANVAS_W / 2 - 18;
    const shipY = CANVAS_H * 0.45 + Math.sin(t * 1.4) * 10;
    ctx.shadowColor = '#00CCFF'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#00BBFF';
    ctx.beginPath();
    ctx.moveTo(shipX + 18, shipY);
    ctx.lineTo(shipX + 36, shipY + 34);
    ctx.lineTo(shipX + 28, shipY + 40);
    ctx.lineTo(shipX + 18, shipY + 26);
    ctx.lineTo(shipX + 8, shipY + 40);
    ctx.lineTo(shipX, shipY + 34);
    ctx.closePath();
    ctx.fill();

    // Instructions
    const blinkOn = Math.floor(t * 2) % 2 === 0;
    ctx.font = 'bold 15px "Courier New"';
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 10;
    ctx.fillStyle = blinkOn ? '#FFD700' : '#AA8800';
    ctx.fillText('PRESS SPACE OR R TO START', CANVAS_W / 2, CANVAS_H * 0.72);

    ctx.font = '12px "Courier New"';
    ctx.fillStyle = '#888';
    ctx.shadowBlur = 0;
    const controls = [
      '← → MOVE    SPACE FIRE    P PAUSE',
      'M MUTE    R RESTART',
    ];
    controls.forEach((c, i) => ctx.fillText(c, CANVAS_W / 2, CANVAS_H * 0.82 + i * 18));

    // High score
    if (this.highScore > 0) {
      ctx.font = '13px "Courier New"';
      ctx.fillStyle = '#AAAAFF';
      ctx.shadowColor = '#AAAAFF'; ctx.shadowBlur = 6;
      ctx.fillText(`BEST: ${String(this.highScore).padStart(6, '0')}`, CANVAS_W / 2, CANVAS_H * 0.91);
    }
    ctx.restore();
  }

  _drawCountdown(ctx) {
    const label = this.countdownVal > 0 ? String(this.countdownVal) : 'GO!';
    // countdownTimer goes 1000→0, so progress = 1 - (timer/900) clamped
    const progress = Math.max(0, Math.min(1, 1 - (this.countdownTimer / 1000)));
    const scale = 1 + progress * 0.6;
    const alpha = Math.max(0.1, 1 - progress * 0.85);
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.translate(CANVAS_W / 2, CANVAS_H / 2);
    ctx.scale(scale, scale);
    ctx.font = 'bold 80px "Courier New"';
    ctx.shadowColor = this.countdownVal > 0 ? '#00FFFF' : '#FFD700';
    ctx.shadowBlur = 40;
    ctx.fillStyle = this.countdownVal > 0 ? '#00FFFF' : '#FFD700';
    ctx.globalAlpha = alpha;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  _drawPauseMenu(ctx) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px "Courier New"';
    ctx.shadowColor = '#00FFFF'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#00FFFF';
    ctx.fillText('PAUSED', CANVAS_W / 2, CANVAS_H / 2 - 20);
    ctx.font = '14px "Courier New"';
    ctx.fillStyle = '#AAAAAA';
    ctx.shadowBlur = 0;
    ctx.fillText('P – RESUME    M – MUTE', CANVAS_W / 2, CANVAS_H / 2 + 22);
    ctx.restore();
  }

  _drawGameOver(ctx) {
    ctx.save();
    const t = Date.now() / 1000;
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = 'center';

    // GAME OVER
    ctx.font = 'bold 48px "Courier New"';
    ctx.shadowColor = '#FF0033';
    ctx.shadowBlur = 30 + Math.sin(t * 3) * 8;
    ctx.fillStyle = '#FF0033';
    ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H * 0.33);

    // Score
    ctx.font = 'bold 22px "Courier New"';
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`SCORE: ${String(this.score).padStart(6, '0')}`, CANVAS_W / 2, CANVAS_H * 0.46);

    // High score
    ctx.font = '15px "Courier New"';
    ctx.shadowColor = '#AAAAFF'; ctx.shadowBlur = 8;
    ctx.fillStyle = this.score >= this.highScore ? '#FFFF44' : '#AAAAFF';
    if (this.score >= this.highScore && this.score > 0) {
      ctx.fillText('★ NEW HIGH SCORE! ★', CANVAS_W / 2, CANVAS_H * 0.54);
    } else {
      ctx.fillText(`BEST: ${String(this.highScore).padStart(6, '0')}`, CANVAS_W / 2, CANVAS_H * 0.54);
    }

    // Level reached
    ctx.font = '13px "Courier New"';
    ctx.fillStyle = '#00CCFF';
    ctx.shadowColor = '#00CCFF'; ctx.shadowBlur = 6;
    ctx.fillText(`REACHED LEVEL ${this.level}`, CANVAS_W / 2, CANVAS_H * 0.62);

    // Blink to restart
    const blink = Math.floor(t * 2) % 2 === 0;
    ctx.font = 'bold 15px "Courier New"';
    ctx.shadowColor = '#FFFFFF'; ctx.shadowBlur = 8;
    ctx.fillStyle = blink ? '#FFFFFF' : '#666666';
    ctx.fillText('PRESS R TO RESTART', CANVAS_W / 2, CANVAS_H * 0.76);

    ctx.restore();
  }
}

// ─────────────────────────────────────────────
//  BOOTSTRAP
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('gameCanvas');
  const game = new Game(canvas);

  // Also allow click/tap on start screen
  canvas.addEventListener('click', () => {
    if (game.state === 'start') {
      game._initAudio();
      game.reset();
    }
  });
  canvas.addEventListener('touchstart', () => {
    if (game.state === 'start') {
      game._initAudio();
      game.reset();
    }
  }, { passive: true });
});
</script>
</body>
</html>
